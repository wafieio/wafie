version: v2beta1
name: devspace
dev:
  app:
    workingDir: /go/src/github.com/wafieio/wafie
    labelSelector:
      app: "wafie-gateway"
#    container: proxy-ads
    container: proxy-xproc
    devImage: docker.io/wafieio/xproc
    sync:
      - path: ./:./
        waitInitialSync: true
        printLogs: true
        polling: true
        disableDownload: true
      - path: ./devspace_start.sh
        printLogs: true
        waitInitialSync: true
        polling: true
    patches:
      - op: remove
        path: spec.containers.name=proxy-ads.readinessProbe
      - op: remove
        path: spec.containers.name=proxy-ads.livenessProbe
      - op: remove
        path: spec.containers.name=proxy.readinessProbe
      - op: remove
        path: spec.containers.name=proxy.livenessProbe
      - op: add
        path: spec.securityContext
        value:
          runAsUser: 0
          runAsGroup: 0
    terminal:
      command: ./devspace_start.sh
    ssh:
      enabled: true
    ports:
      - port: "2345"



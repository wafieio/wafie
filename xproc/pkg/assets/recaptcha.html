<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: block;
        }

        h1 {
            margin-bottom: 1rem;
            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .description {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .form-container {
            margin: 2rem 0;
        }

        .recaptcha-container {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .submit-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
            width: 100%;
            max-width: 200px;
        }

        .submit-btn:hover:not(:disabled) {
            background: #3367d6;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-top: 1rem;
            border-left: 4px solid #c33;
            display: none;
        }

        .loading {
            display: none;
            color: #666;
            margin-top: 1rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #888;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

    <h1>Security Verification Required</h1>

    <div class="description">
        Our security system has detected unusual activity. Please complete the verification below to continue.
    </div>

    <form id="recaptcha-form" method="POST">
        <div class="form-container">
            <div class="recaptcha-container">
                <div class="g-recaptcha"
                     data-sitekey="6LcNe1AsAAAAAJvsGyjHacFw48phY1hVsaalkmi8"
                     data-callback="onRecaptchaSuccess"
                     data-expired-callback="onRecaptchaExpired"
                     data-error-callback="onRecaptchaError">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn" disabled>
                Verify
            </button>

            <div class="loading" id="loading">
                Verifying your response...
            </div>

            <div class="error-message" id="error-message">
                Verification failed. Please try again.
            </div>
        </div>
    </form>

    <div class="footer">
        Protected by reCAPTCHA and subject to the Google
        <a href="https://policies.google.com/privacy" target="_blank">Privacy Policy</a> and
        <a href="https://policies.google.com/terms" target="_blank">Terms of Service</a>.
    </div>
</div>

<script>
    // Global callback functions for reCAPTCHA
    function onRecaptchaSuccess(token) {
        console.log('reCAPTCHA completed successfully');
        document.getElementById('submit-btn').disabled = false;
        hideError();
    }

    function onRecaptchaExpired() {
        console.log('reCAPTCHA expired');
        document.getElementById('submit-btn').disabled = true;
        showError('reCAPTCHA expired. Please try again.');
    }

    function onRecaptchaError() {
        console.log('reCAPTCHA error');
        document.getElementById('submit-btn').disabled = true;
        showError('reCAPTCHA error. Please refresh the page and try again.');
    }

    // Form submission handling
    document.getElementById('recaptcha-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const recaptchaResponse = grecaptcha.getResponse();
        if (!recaptchaResponse) {
            showError('Please complete the reCAPTCHA verification.');
            return;
        }

        // Show loading state
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');

        submitBtn.style.display = 'none';
        loading.style.display = 'block';
        hideError();

        // Submit the form data
        submitRecaptcha(recaptchaResponse);
    });

    async function submitRecaptcha(token) {
        try {
            const response = await fetch("/v2/g-recaptcha-response", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'g-recaptcha-response=' + encodeURIComponent(token)
            });
            if (response.ok) {
                // Success - redirect or show success message
                const result = await response.text();
                // Check if response contains redirect instruction
                if (result.includes('success')) {
                    window.location.href = 'http://httpbin.10.100.102.92.nip.io/get';
                } else {
                    showError('Verification failed. Please try again.');
                    resetForm();
                }

            } else {
                throw new Error('Verification failed');
            }
        } catch (error) {
            console.error('Error submitting reCAPTCHA:', error);
            showError('Verification failed. Please try again.');
            resetForm();
        }
    }

    function showError(message) {
        const errorEl = document.getElementById('error-message');
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }

    function hideError() {
        document.getElementById('error-message').style.display = 'none';
    }

    function resetForm() {
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');

        submitBtn.style.display = 'inline-block';
        submitBtn.disabled = true;
        loading.style.display = 'none';

        // Reset reCAPTCHA
        grecaptcha.reset();
    }

    // Auto-focus on reCAPTCHA when page loads
    window.addEventListener('load', function () {
        // Give reCAPTCHA time to load
        setTimeout(function () {
            const recaptcha = document.querySelector('.g-recaptcha');
            if (recaptcha) {
                recaptcha.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }, 1000);
    });
</script>

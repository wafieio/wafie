syntax = "proto3";

import "wafie/v1/application.proto";
import "wafie/v1/crs.proto";

package wafie.v1;


enum ParanoiaLevel {
  PARANOIA_LEVEL_UNSPECIFIED = 0;
  PARANOIA_LEVEL_1 = 1;
  PARANOIA_LEVEL_2 = 2;
  PARANOIA_LEVEL_3 = 3;
  PARANOIA_LEVEL_4 = 4;
}

enum ProtectionMode {
  PROTECTION_MODE_UNSPECIFIED = 0;
  PROTECTION_MODE_ON = 1;
  PROTECTION_MODE_OFF = 2;
}

enum GetProtectionOptionsIncludeCrsRules{
  GET_PROTECTION_OPTIONS_INCLUDE_CRS_RULES_UNSPECIFIED = 0;
  GET_PROTECTION_OPTIONS_INCLUDE_CRS_RULES_ALL = 1;
  GET_PROTECTION_OPTIONS_INCLUDE_CRS_RULES_ACTIVE = 2;
  GET_PROTECTION_OPTIONS_INCLUDE_CRS_RULES_NONE = 3;
}

message CaptchaV2 {
  optional string site_key = 1;
  optional string secret_key = 2;
  optional string redirect_url = 3;
  optional bool enabled = 4;
}

message AntiBot {
  optional bool enabled = 1;
  optional string response_statuses = 2;
  optional uint32 fail_threshold = 3;
  optional uint32 fail_window = 4;
  optional uint32 block_period = 5;
  optional CaptchaV2 captcha_v2 = 6;
}

message BasicAuthUser {
  string user = 1;
  string pass = 2;
}

message TokenAuthToken {
  string token = 1;
  optional uint64 valid_after = 2;
  optional uint64 valid_before = 3;
  optional string description = 4;
}

message BasicAuthPutRequest {
  repeated BasicAuthUser users_to_add = 1;
  repeated BasicAuthUser users_to_remove = 2;
  repeated string path_whitelist_to_add = 3;
  repeated string path_whitelist_to_remove = 4;
  optional bool enabled = 5;
}

message TokenAuthPutRequest {
  repeated TokenAuthToken tokens_to_add = 1;
  repeated TokenAuthToken tokens_to_remove = 2;
  repeated string path_whitelist_to_add = 3;
  repeated string path_whitelist_to_remove = 4;
  optional bool enabled = 5;
  optional string header = 6;

}

message BasicAuth {
  repeated BasicAuthUser users = 1;
  repeated string path_whitelist = 3;
  optional bool enabled = 4;
}

message TokenAuth {
  string header = 1;
  repeated TokenAuthToken tokens = 2;
  optional bool enabled = 3;
  repeated string path_whitelist = 4;
}

message Auth {
  optional BasicAuth basic_auth = 1;
  optional TokenAuth token_auth = 2;
}

message IP {
  string cidr = 1;
}

message IPRules {
  repeated IP block = 1;
  repeated IP allow = 2;
}

message Waf {
  ProtectionMode protection_mode = 1;
  ParanoiaLevel paranoia_level = 2;
}

message ProtectionDesiredState {
  optional Waf waf = 1;
  optional uint32  xff_num_trusted_hops = 2;
  optional IPRules ip_rules = 3;
  optional Auth auth = 4;
  optional AntiBot anti_bot = 5;
}

message Protection {
  uint32 id = 1;
  uint32 application_id = 2;
  optional Application application = 3;
  ProtectionMode protection_mode = 4;
  ProtectionDesiredState desired_state = 5;
  repeated CrsVersion crs_versions = 6;
}

message CreateProtectionRequest {
  uint32 application_id = 1;
}

message CreateProtectionResponse {
  Protection protection = 1;
}

message GetProtectionOptions {
  optional GetProtectionOptionsIncludeCrsRules include_crs_rules = 1;
}

message GetProtectionRequest {
  optional uint32 id = 1;
  optional uint32 application_id = 2;
  optional GetProtectionOptions options = 3;
}


message GetProtectionResponse {
  Protection protection = 1;
}

message PutProtectionRequest {
  uint32 id = 1;
  optional ProtectionMode protection_mode = 2;
  optional Waf waf = 3;
  optional uint32  xff_num_trusted_hops = 4;
  optional IPRules ip_rules_to_add = 5;
  optional IPRules ip_rules_to_remove = 6;
  optional BasicAuthPutRequest basic_auth = 7;
  optional TokenAuthPutRequest token_auth = 9;
  optional AntiBot anti_bot = 10;

}

message PutProtectionResponse {
  Protection protection = 1;
}

message ListProtectionsOptions {
  optional ProtectionMode protection_mode = 1;
  optional ProtectionMode mod_sec_mode = 2;
  optional bool include_apps = 3;
  optional string upstream_host = 4;
}

message ListProtectionsRequest {
  ListProtectionsOptions options = 1;
}

message ListProtectionsResponse {
  repeated Protection protections = 1;
}

message DeleteProtectionRequest {
  uint32 id = 1;
}

message DeleteProtectionResponse {}

service ProtectionService {
  rpc CreateProtection(CreateProtectionRequest) returns (CreateProtectionResponse);
  rpc GetProtection(GetProtectionRequest) returns (GetProtectionResponse);
  rpc ListProtections(ListProtectionsRequest) returns (ListProtectionsResponse);
  rpc PutProtection(PutProtectionRequest) returns (PutProtectionResponse);
  rpc DeleteProtection(DeleteProtectionRequest) returns (DeleteProtectionResponse);
}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wafie-api
  namespace: {{.Release.Namespace}}
spec:
  rules:
    - host: "wafie-api-{{ .Values.baseHost }}"
      http:
        paths:
          - backend:
              service:
                name: wafie-api
                port:
                  name: api-server
            path: /
            pathType: ImplementationSpecific
syntax = "proto3";

package wafie.v1;

enum CrsVersionStatus {
  CRS_VERSION_STATUS_UNSPECIFIED = 0;
  CRS_VERSION_STATUS_ACTIVE = 1;
  CRS_VERSION_STATUS_INACTIVE = 2;
}

message CrsProfile {
  string version = 1;
  string name = 2;
  string crs_file_name = 3;
  string crs_file_content = 4;
}

message CrsVersion {
  optional uint32 id = 1;
  string tag = 2;
  CrsVersionStatus status = 3;
  uint32 protection_id = 4;
  repeated CrsRuleSet crs_rule_sets = 5;
}

message CrsRuleSet {
  uint32 id = 1;
  string crs_file_name = 2;
  string crs_file_content = 3;
  uint32 crs_version_id = 5;
  string md5 = 6;
}

message Rule {
  repeated string base64_rule = 1;
  uint32 rule_set_id = 2;
  string application_name = 3;
}


message CreateRuleRequest {
  Rule rule = 1;
}

message CreateRuleResponse {}


message CreateCrsVersionRequest{
  CrsVersion version = 1;
}

message CreateCrsVersionResponse{
  CrsVersion version = 1;
}

message CreateCrsRuleSetRequest{
  uint32 crs_version_id = 1;
  string profile_name = 2;
}

message CreateCrsRuleSetResponse{}


service CrsService {
  // CRS Version methods
  rpc CreateCrsVersion(CreateCrsVersionRequest) returns (CreateCrsVersionResponse);
  // CRS Rule Set methods
  rpc CreateCrsRuleSet(CreateCrsRuleSetRequest) returns (CreateCrsRuleSetResponse);
  // Rule methods
  rpc CreateRule(CreateRuleRequest) returns (CreateRuleResponse);
}
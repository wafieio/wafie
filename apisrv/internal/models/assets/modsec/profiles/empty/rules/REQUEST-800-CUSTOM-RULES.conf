# ------------------------------------------------------------------------
# wafie custom rules for empty profile
# wafie custom rule IDs will be starting from id:1000000
# ------------------------------------------------------------------------

# ============ Client IP detection START  ===================
SecRule REQUEST_URI "@beginsWith /v1/wafie/cip/" \
    "id:1000000,\
    phase:1,\
    log,\
    redirect:'sys?action=headerCheck&headerName=x-forwarded-for&status=200'"
# ============ Client IP detection END  ===================

# Allow requests if the remote IP matches the list in the file
# if IP matched do not process other rules
# ============ IP BLOCK START  ====================
SecRule REMOTE_ADDR "@ipMatchFromFile allowed_ips.txt" \
    "id:1000001, \
    phase:1, \
    pass, \
    log, \
    allow"
# Block requests if the remote IP matches the list in the file
SecRule REMOTE_ADDR "@ipMatchFromFile blocked_ips.txt" \
    "id:1000002, \
    phase:1, \
    deny, \
    status:403, \
    log, \
    msg:'Access denied: IP address blocked'"
# ============ IP BLOCK END  ====================

# ============ BASIC AUTH START =================
SecRuleScript "<<<WAFIEIO_XPROC_RULES_BASE_PATH>>>/rules/basic_auth.lua" \
  "id:1000003, \
  phase:1, \
  deny, \
  log, \
  redirect:'sys?basicAuthHeader=true&status=401', \
  msg:'Unauthorized Access Attempt: No valid credentials found'"
{{{- if not .Auth.BasicAuth.Enabled  }}}
SecRuleRemoveById 1000003
{{{- end  }}}
# ============ BASIC AUTH END ===================

# ============ TOKEN AUTH START =================
SecRuleScript "<<<WAFIEIO_XPROC_RULES_BASE_PATH>>>/rules/token_auth.lua" \
  "id:1000004, \
  phase:1, \
  deny, \
  log, \
  msg:'Unauthorized Access Attempt: No valid credentials found'"
{{{- if not .Auth.TokenAuth.Enabled  }}}
SecRuleRemoveById 1000004
{{{- end  }}}
# ============ TOKEN AUTH END ===================

# ============ reCaptcha v2 START =================
# --- PHASE 1: PREPARATION & BLOCKING ---

# 1. Initialize the IP collection
SecAction "id:1000005,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR}"

# 2. Check if IP is blocked, but skip for the verification URL
SecRule ip:ip_blocked "@eq 1" \
    "id:1000007,\
    phase:1,\
    log,\
    msg:'IP blocked, redirecting to captcha',\
    redirect:'sys?action=recaptcha&status=200',\
    chain"
    SecRule REQUEST_URI "!@streq /v2/g-recaptcha-response" "t:none"

# --- PHASE 2: VERIFICATION LOGIC ---

# 3. Initialize the transaction state
SecAction "id:1000010,phase:2,nolog,pass,setvar:tx.captcha_verified=0"

# 4. Run the Lua script only on the specific verification POST
SecRule REQUEST_METHOD "@streq POST" \
    "id:1000006,\
    phase:2,\
    pass,\
    nolog,\
    chain"
    SecRule REQUEST_URI "@streq /v2/g-recaptcha-response" \
        "t:none,\
        exec:<<<WAFIEIO_XPROC_RULES_BASE_PATH>>>/rules/recaptchav2.lua"

# 5. Debug Log (Moved after Lua execution)
SecAction \
    "id:1000013,\
    phase:2,\
    log,\
    pass,\
    msg:'Captcha Verification Result: %{TX.captcha_verified}'"

# 6. HANDLE SUCCESS: Reset everything and redirect
SecRule TX:captcha_verified "@eq 1" \
    "id:1000008, \
     phase:2, \
     setvar:ip.fail_count=0,\
     setvar:ip.ip_blocked=0,\
     redirect:'sys?action=recaptchaSuccess&status=200'"

# 7. HANDLE FAILURE: Redirect to error page
SecRule TX:captcha_verified "@eq 2" \
    "id:1000009, \
     phase:2, \
     redirect:'sys?action=recaptchaError&status=200'"

# --- PHASE 5: ACCOUNTING & STATS ---

# 8. Count 40X (^4[0-9]{2}$) errors (brute force tracking)
SecRule RESPONSE_STATUS "{{{ .AntiBot.ResponseStatuses }}}" \
    "id:1000011,\
    phase:5,\
    pass,\
    nolog,\
    setvar:ip.fail_count=+1,\
    expirevar:ip.fail_count={{{ .AntiBot.FailWindow }}}"

# 9. Trigger the block if threshold met
SecRule ip:fail_count "@ge {{{ .AntiBot.FailThreshold }}}" \
    "id:1000012,\
    phase:5,\
    pass,\
    nolog,\
    setvar:ip.ip_blocked=1,\
    expirevar:ip.ip_blocked={{{ .AntiBot.BlockPeriod }}}"

{{{- if not .AntiBot.Enabled  }}}
SecRuleRemoveById 1000010
SecRuleRemoveById 1000006
SecRuleRemoveById 1000013
SecRuleRemoveById 1000008
SecRuleRemoveById 1000009
SecRuleRemoveById 1000011
SecRuleRemoveById 1000012
{{{- end  }}}
# ============ reCaptcha v2 END ===================



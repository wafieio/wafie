# ------------------------------------------------------------------------
# wafie custom rules for empty profile
# wafie custom rule IDs will be starting from id:1000000
# ------------------------------------------------------------------------

# Allow requests if the remote IP matches the list in the file
# if IP matched do not process other rules
SecRule REMOTE_ADDR "@ipMatchFromFile allowed_ips.txt" \
    "id:1000001, \
    phase:1, \
    pass, \
    log, \
    allow, \
    ctl:ruleEngine=Off"
# Block requests if the remote IP matches the list in the file
SecRule REMOTE_ADDR "@ipMatchFromFile blocked_ips.txt" \
    "id:1000002, \
    phase:1, \
    deny, \
    status:403, \
    log, \
    msg:'Access denied: IP address blocked' \
    ctl:ruleEngine=Off"

# ============ Basic authentication START =================
# 1. Initialize the block flag
SecAction \
    "id:1000003, \
    phase:1, \
    nolog, \
    pass, \
    setvar:tx.auth_blocked=1"
# 2. Check credentials (Normalized)
SecRule REQUEST_HEADERS:Authorization "@pmFromFile basic_auth_users.txt" \
    "id:1000004, \
    phase:1, \
    pass, \
    log, \
    t:none,t:urlDecode,t:lowercase, \
    setvar:tx.auth_blocked=0, \
    msg:'Successful authentication for user'"
# 3. Enforce the block
SecRule TX:auth_blocked "@eq 1" \
    "id:1000005, \
    phase:1, \
    deny, \
    log, \
    status:401, \
    msg:'Unauthorized Access Attempt: No valid credentials found', \
    setenv:AUTH_REQUIRED=1"
{{{- if not .Auth.BasicAuth.Enabled  }}}
SecRuleRemoveById 1000003
SecRuleRemoveById 1000004
SecRuleRemoveById 1000005
{{{- end  }}}
# ============ Basic authentication END =================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wafie-api
  namespace: {{.Release.Namespace}}
  annotations: {{ .Values.api.ingress.annotations | toJson }}
spec:
  rules:
    - host: "{{ .Values.api.ingress.host }}"
      http:
        paths:
          - backend:
              service:
                name: wafie-api
                port:
                  name: api-server
            path: /
            pathType: ImplementationSpecific
{{- if .Values.api.ingress.tls }}
  tls:
    - hosts:
        - "{{ .Values.api.ingress.host }}"
      secretName: {{ .Values.api.svc.name }}-certs
{{- end }}
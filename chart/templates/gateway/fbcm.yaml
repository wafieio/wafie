apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: {{.Release.Namespace}}
data:
  fluent-bit.yaml: |
    parsers:
      - name: json_parser_with_timestamp
        format: json
        time_key: time_stamp
        time_format: "%a %b %d %H:%M:%S %Y"  # Mon Nov 10 18:43:19 2025
        time_keep: On
    pipeline:
      inputs:
        - name: tail
          path: /data/audit/modsec.log
          tag: modsec.logs
          refresh_interval: 5
      filters:
        - name: parser
          match: modsec.logs
          key_name: log
          parser: json_parser_with_timestamp
          reserve_data: On
      outputs:
        # PostgreSQL output - stores WAF events as JSONB
        - name: pgsql
          match: modsec.logs
          host: {{ .Release.Name }}-postgresql
          port: 5432
          user: {{ .Values.postgresql.auth.username }}
          password: {{ .Values.postgresql.auth.password }}
          database: {{ .Values.postgresql.auth.database }}
          table: events
          timestamp_key: time
          async: false

name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: contains(github.event.head_commit.message, 'release')
    name: Build and push multi-arch images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Chart.yaml
        id: chart_version
        run: |
          VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check if API image exists
        id: check_api
        run: |
          if docker manifest inspect wafieio/api:${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "API image wafieio/api:${{ steps.chart_version.outputs.version }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "API image wafieio/api:${{ steps.chart_version.outputs.version }} does not exist, will build"
          fi

      - name: Build and push API image
        if: steps.check_api.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apisrv/Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            wafieio/api:latest
            wafieio/api:${{ steps.chart_version.outputs.version }}

      - name: Check if Gateway image exists
        id: check_gateway
        run: |
          if docker manifest inspect wafieio/gateway:${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Gateway image wafieio/gateway:${{ steps.chart_version.outputs.version }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Gateway image wafieio/gateway:${{ steps.chart_version.outputs.version }} does not exist, will build"
          fi

      - name: Build and push Gateway image
        if: steps.check_gateway.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            wafieio/gateway:latest
            wafieio/gateway:${{ steps.chart_version.outputs.version }}

      - name: Check if XProc image exists
        id: check_xproc
        run: |
          if docker manifest inspect wafieio/xproc:${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "XProc image wafieio/xproc:${{ steps.chart_version.outputs.version }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "XProc image wafieio/xproc:${{ steps.chart_version.outputs.version }} does not exist, will build"
          fi

      - name: Build and push XProc image
        if: steps.check_xproc.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: xproc/Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            wafieio/xproc:latest
            wafieio/xproc:${{ steps.chart_version.outputs.version }}

      - name: Check if Relay image exists
        id: check_relay
        run: |
          if docker manifest inspect wafieio/relay:${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Relay image wafieio/relay:${{ steps.chart_version.outputs.version }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Relay image wafieio/relay:${{ steps.chart_version.outputs.version }} does not exist, will build"
          fi

      - name: Build and push Relay image
        if: steps.check_relay.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: relay/Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            wafieio/relay:latest
            wafieio/relay:${{ steps.chart_version.outputs.version }}

  helm:
    needs: build
    name: Package and publish Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Chart.yaml
        id: chart_version
        run: |
          VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view v${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.chart_version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.chart_version.outputs.version }} does not exist, will create"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Helm chart exists in GHCR
        id: check_helm_oci
        run: |
          if helm pull oci://ghcr.io/${{ github.repository_owner }}/charts/wafie --version ${{ steps.chart_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Helm chart wafie:${{ steps.chart_version.outputs.version }} already exists in GHCR, skipping push"
            rm -f wafie-${{ steps.chart_version.outputs.version }}.tgz
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Helm chart wafie:${{ steps.chart_version.outputs.version }} does not exist in GHCR, will push"
          fi

      - name: Package Helm chart
        run: |
          helm package chart
          echo "Packaged: wafie-${{ steps.chart_version.outputs.version }}.tgz"

      - name: Push Helm chart to GHCR
        if: steps.check_helm_oci.outputs.exists == 'false'
        run: |
          helm push wafie-${{ steps.chart_version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          echo "Pushed Helm chart to oci://ghcr.io/${{ github.repository_owner }}/charts/wafie:${{ steps.chart_version.outputs.version }}"

      - name: Install ORAS
        if: steps.check_helm_oci.outputs.exists == 'false'
        run: |
          VERSION="1.1.0"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_${VERSION}_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_${VERSION}_*.tar.gz oras-install/

      - name: Tag Helm chart as latest
        if: steps.check_helm_oci.outputs.exists == 'false'
        run: |
          oras tag ghcr.io/${{ github.repository_owner }}/charts/wafie:${{ steps.chart_version.outputs.version }} latest
          echo "Tagged Helm chart as latest"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.chart_version.outputs.version }}
          name: Release v${{ steps.chart_version.outputs.version }}
          files: |
            wafie-${{ steps.chart_version.outputs.version }}.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

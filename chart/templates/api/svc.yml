apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.svc.name }}
  namespace: {{.Release.Namespace}}
spec:
  type: ClusterIP
  selector:
    app: wafie-api
  ports:
    - name: api-server
      port: {{.Values.api.svc.port}}
      targetPort: api-server
    - name: gwctrl-server
      port: 18000
      targetPort: gwctrl-server
    - name: waf-gateway
      port: 8888
      targetPort: waf-gateway